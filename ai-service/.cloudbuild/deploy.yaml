steps:
  # Build and Push
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest || exit 0']
  - name: "gcr.io/cloud-builders/docker"
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest",
        "--cache-from",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest",
      ]

  # Deploy to Staging
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_CONTAINER_NAME}"
      - "--project"
      - "${PROJECT_ID}"
      - "--region" 
      - "${_REGION}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}"
      - "--port" 
      - "8080"
      - "--cpu"
      - "4000m"
      - "--memory"
      - "16Gi"
      - "--concurrency"
      - "40"
      - "--gpu"
      - "1"
      - "--gpu-type"
      - "nvidia-l4"
      - "--no-gpu-zonal-redundancy"
      - "--concurrency"
      - "10"
      - "--service-account"
      - "auto-claims-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - 'AGENT_ENGINE_ENABLED=${_AGENT_ENGINE_ENABLED},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},MOCK_MODE=false,ASSESSOR_AGENT_URL=https://${_REGION}-aiplatform.googleapis.com/v1beta1/projects/${PROJECT_ID}/locations/${_REGION}/reasoningEngines/${_ASSESSOR_AGENT},PROCESSOR_AGENT_URL=https://${_REGION}-aiplatform.googleapis.com/v1beta1/projects/${PROJECT_ID}/locations/${_REGION}/reasoningEngines/${_PROCESSOR_AGENT},REPAIR_SHOP_AGENT_URL=https://${_REGION}-aiplatform.googleapis.com/v1beta1/projects/${PROJECT_ID}/locations/${_REGION}/reasoningEngines/${_REPAIR_AGENT},BUCKET_NAME=${PROJECT_ID}-auto-claims'
      - "--startup-probe"
      - 'initialDelaySeconds=30,tcpSocket.port=8080,timeoutSeconds=240,periodSeconds=240,failureThreshold=1'
      - "--max=1"
      - "--min=1"
      - "--no-iap"
      - "--allow-unauthenticated"
      - "--timeout"
      - "300"
      - "--cpu-boost"
      - "--session-affinity"
      - "--set-secrets"
      - 'HF_TOKEN=hf-token:latest'
      - "--ingress"
      - "all"
      - "--labels=appid=auto-claims"

substitutions:
  _REGION: ${_REGION}
  _ARTIFACT_REGISTRY_REPO_NAME: auto-claims
  _CONTAINER_NAME: auto-claims-ai-service
  _COMMIT_SHA: ${_COMMIT_SHA}
  _AGENT_ENGINE_ENABLED: "true"
  _ASSESSOR_AGENT: "9116605059751215104"
  _PROCESSOR_AGENT: "8691014894964703232"
  _REPAIR_AGENT: "109405805010223104"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest

options:
  pool:
    name: "projects/$PROJECT_ID/locations/$LOCATION/workerPools/auto-claims"
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
  requestedVerifyOption: VERIFIED
