steps:
  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      [
        "build",
        "--build-arg",
        "PROJECT_ID=${PROJECT_ID}",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
      ]

  # Deploy to Staging
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_CONTAINER_NAME}"
      - "--project"
      - "${PROJECT_ID}"
      - "--region"
      - "${_REGION}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}"
      - "--port"
      - "5950"
      - "--cpu"
      - "1000m"
      - "--memory"
      - "512Mi"
      - "--concurrency"
      - "5"
      - "--service-account"
      - "auto-claims-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - 'OTEL_SERVICE_NAME=auto-claims-loadgen'
      - "--no-cpu-throttling"
      - "--allow-unauthenticated"
      - "--max-instances"
      - "1"
      - "--min-instances"
      - "1"
      - "--timeout"
      - "180"

substitutions:
  _STAGING_PROJECT_ID: ${PROJECT_ID}
  _REGION: ${_REGION}
  _ARTIFACT_REGISTRY_REPO_NAME: auto-claims
  _CONTAINER_NAME: auto-claims-loadgen
  _COMMIT_SHA: ${_COMMIT_SHA}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
  requestedVerifyOption: VERIFIED
