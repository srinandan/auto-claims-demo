steps:
  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      [
        "build",
        "--build-arg",
        "PROJECT_ID=${PROJECT_ID}",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
      ]

  # Deploy to Staging
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "auto-claims-frontend"
      - "--project"
      - "${PROJECT_ID}"
      - "--region"
      - "${_REGION}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}"
      - "--port"
      - "8080"
      - "--cpu"
      - "1000m"
      - "--memory"
      - "1Gi"
      - "--concurrency"
      - "10"
      - "--service-account"
      - "auto-claims-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - 'VITE_API_BASE_URL="https://autoclaims.endpoints.${PROJECT_ID}.cloud.goog,OTEL_SERVICE_NAME=auto-claims-frontend'
      - "--startup-probe"
      - 'initialDelaySeconds=30,tcpSocket.port=8080,timeoutSeconds=240,periodSeconds=240,failureThreshold=1'
      - "--max-instances"
      - "1"
      - "--allow-unauthenticated"
      - "--timeout"
      - "300"
      - "--cpu-boost"
      - "--session-affinity"
      - "--ingress"
      - "internal-and-cloud-load-balancing"

substitutions:
  _STAGING_PROJECT_ID: ${PROJECT_ID}
  _REGION: ${_REGION}
  _ARTIFACT_REGISTRY_REPO_NAME: auto-claims
  _CONTAINER_NAME: auto-claims-frontend
  _CLOUD_RUN_APP_SA_EMAIL: "auto-claims-sa@${PROJECT_ID}.iam.gserviceaccount.com"
  _COMMIT_SHA: ${_COMMIT_SHA}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
  requestedVerifyOption: VERIFIED