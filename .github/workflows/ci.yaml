name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'

jobs:
  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Codespell
        uses: codespell-project/actions-codespell@v2
        with:
          check_filenames: true
          check_hidden: false
          skip: "*.json,*.csv,*.lock,package-lock.json,*.sum,*.mod,*.png,*.jpg,*.webm,*.pdf,*.toml,*.zone"

  dead-links:
    name: Dead Links Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Lint ai-service
        run: |
          cd ai-service
          uv sync --dev
          uv pip install pylint
          uv run pylint --disable=all --enable=E,F $(git ls-files '*.py')
      - name: Lint assessor-agent
        run: |
          cd assessor-agent
          uv sync --dev
          uv pip install pylint
          uv run pylint --disable=all --enable=E,F $(git ls-files '*.py')
      - name: Lint processor-agent
        run: |
          cd processor-agent
          uv sync --dev
          uv pip install pylint
          uv run pylint --disable=all --enable=E,F $(git ls-files '*.py')
      - name: Lint repair-shop-agent
        run: |
          cd repair-shop-agent
          uv sync --dev
          uv pip install pylint
          uv run pylint --disable=all --enable=E,F $(git ls-files '*.py')

